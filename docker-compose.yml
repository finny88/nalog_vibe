services:
  postgres:
    image: postgres:16.4-alpine
    container_name: nalog-vibe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nalog_vibe}
      POSTGRES_USER: ${POSTGRES_USER:-nalog_vibe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nalog_vibe}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nalog_vibe} -d ${POSTGRES_DB:-nalog_vibe}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
